# Test profile — in-memory H2, no AWS, no external services

spring.application.name=careconnect-test

# H2 in-memory database
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=VALUE;INIT=CREATE DOMAIN IF NOT EXISTS JSONB AS TEXT\\;CREATE DOMAIN IF NOT EXISTS TSQUERY AS VARCHAR\\;CREATE DOMAIN IF NOT EXISTS TSVECTOR AS VARCHAR
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# Remap Blob → Binary Large Object so H2 can create the schema from Hibernate DDL
spring.jpa.properties.hibernate.type.preferred_blob_jdbc_type=LONGVARBINARY
spring.jpa.show-sql=false

# Disable Flyway — DDL managed by Hibernate in test
spring.flyway.enabled=false
# Disable Spring SQL init — prevents classpath db/migration/*.sql from running against H2
spring.sql.init.mode=never

# Disable all AWS services
careconnect.aws.enabled=false
careconnect.database.use-aws-config=false
careconnect.recording.enabled=false

# Disable SSM parameter store
careconnect.ssm.enabled=false
spring.config.import=

# JWT — value must be valid base64 (JwtTokenProvider calls Base64.getDecoder().decode())
# 88 base64 chars = 66 bytes = 528 bits — satisfies HS256/HS512 minimum
jwt.secret=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
security.jwt.secret=AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
jwt.expiration=3600000
security.jwt.expiration=3600000

# Disable all external API services
careconnect.stripe.enabled=false
careconnect.openai.enabled=false
careconnect.deepseek.enabled=false
careconnect.openrouter.enabled=false
careconnect.ai.enabled=false

# Stub required env-var placeholders so context starts without real credentials
stripe.secret-key=sk_test_stub
stripe.webhook-secret=whsec_stub
openai.api-key=stub
deepseek.api.key=stub
openrouter.api.key=stub
spring.mail.password=stub
aws.s3.access-key=stub
aws.s3.secret-key=stub
spring.security.oauth2.client.registration.google.client-id=stub
spring.security.oauth2.client.registration.google.client-secret=stub
spring.security.oauth2.client.registration.google.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://www.googleapis.com/oauth2/v4/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub
spring.security.oauth2.client.registration.fitbit.client-id=stub
spring.security.oauth2.client.registration.fitbit.client-secret=stub
spring.security.oauth2.client.registration.fitbit.provider=fitbit
spring.security.oauth2.client.registration.fitbit.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.fitbit.scope=activity,heartrate,profile
spring.security.oauth2.client.registration.fitbit.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
spring.security.oauth2.client.provider.fitbit.authorization-uri=https://www.fitbit.com/oauth2/authorize
spring.security.oauth2.client.provider.fitbit.token-uri=https://api.fitbit.com/oauth2/token
spring.security.oauth2.client.provider.fitbit.user-info-uri=https://api.fitbit.com/1/user/-/profile.json
spring.security.oauth2.client.provider.fitbit.user-name-attribute=user
google.oauth.client-id=stub
google.oauth.client-secret=stub
google.oauth.redirect-uri=http://localhost/stub
google.oauth.frontend-url=http://localhost
google.oauth.scope=email
google.client-id=stub
google.client-secret=stub

# CORS
careconnect.cors_allowed=http://localhost:3000
careconnect.baseurl=http://localhost:8080
frontend.base-url=http://localhost:3000

# Firebase (stubs - push notifications disabled in tests)
firebase.project-id=stub-project
firebase.sender-id=stub-sender

# AWS S3 (stubs - disabled in tests)
aws.s3.bucket=stub-bucket
aws.s3.region=us-east-1
aws.s3.bucket-name=stub-bucket
aws.region=us-east-1

# File storage
app.file.storage.use-s3=false
app.file.storage.default=database
careconnect.upload.dir=./uploads

# Email service configuration
careconnect.email.provider=console
careconnect.email.from=test@careconnect.local
careconnect.email.sendgrid.api-key=stub
careconnect.email.resend.api-key=stub
careconnect.email.mailgun.api-key=stub
careconnect.email.mailgun.domain=stub.domain.com
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=stub

# Subscription
subscription.premium-price-ids=price_stub_premium
subscription.standard-price-ids=price_stub_standard

# AI configuration
ai.model.provider=stub
openai.model.name=stub
careconnect.ai.provider=stub
careconnect.ai.api.url=http://localhost
careconnect.ai.api.key=stub
careconnect.ai.model.name=stub
careconnect.ai.model.temperature=0.7
openrouter.api.url=http://localhost

# WebSocket configuration
careconnect.websocket.mode=local
careconnect.websocket.endpoint=/ws/careconnect
careconnect.websocket.allowed-origins=*
careconnect.websocket.connection-ttl-minutes=30
careconnect.websocket.aws.api-gateway-endpoint=
careconnect.websocket.aws.region=us-east-1

# Email crypto
email.crypto.secret=test-secret-32-bytes-long-here!!!

# Alexa OAuth
alexa.oauth.client-id=stub
alexa.oauth.client-secret=stub

# Transcript archival
app.call.transcript.archive.enabled=false
app.call.transcript.archive.min-segments=120
app.call.transcript.archive.min-chars=20000
app.call.transcript.archive.delete-db-after-archive=false

# Telemetry
telemetry.enabled=false

# Spring AI
spring.ai.openai.api-key=stub
spring.ai.openai.base-url=http://localhost
spring.ai.openai.chat.options.model=stub
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration

# Disable scheduling to prevent background jobs during tests
spring.task.scheduling.pool.size=1

# Logging
logging.level.com.careconnect=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.flywaydb=WARN
