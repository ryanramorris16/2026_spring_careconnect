AWSTemplateFormatVersion: '2010-09-09'
Description: >
  CareConnect Team B - IAM Roles & S3 Storage Stack
  Provisions the application IAM role, API Gateway execution role,
  and the internal S3 bucket with KMS encryption.
  REQ-SB-201-1 | AC-SB-INF-001 | UC-002

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

  DomainName:
    Type: String
    Description: Application domain name (e.g. careconnect.example.com)

Resources:

  InternalS3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cc-internal-file-storage-us-east-1-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: aws:kms
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: careconnect
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  InternalS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref InternalS3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyUnencryptedUploads
            Effect: Deny
            Principal: "*"
            Action: s3:PutObject
            Resource: !Sub "${InternalS3Bucket.Arn}/*"
            Condition:
              "Null":
                s3:x-amz-server-side-encryption: "true"
          - Sid: AllowCCInternalCompute
            Effect: Allow
            Principal:
              AWS:
                - !Sub "arn:aws:iam::${AWS::AccountId}:root"
                - !GetAtt CcAppRole.Arn
            Action: s3:*
            Resource:
              - !GetAtt InternalS3Bucket.Arn
              - !Sub "${InternalS3Bucket.Arn}/*"

  IacBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "cc-iac-artifacts-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Project
          Value: careconnect
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CcAppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CCAPPROLE
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service:
                - events.amazonaws.com
                - states.amazonaws.com
                - lambda.amazonaws.com
                - apigateway.amazonaws.com
                - amplify.amazonaws.com
            Action: sts:AssumeRole
      Tags:
        - Key: Name
          Value: CCAPPROLE
        - Key: Project
          Value: careconnect

  CcAppRolePolicy:
    Type: AWS::IAM::ManagedPolicy
    DependsOn: CcAppRole
    Properties:
      ManagedPolicyName: CCAPPROLEPolicy
      Description: Policy for CareConnect application role
      Roles:
        - !Ref CcAppRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AccessS3
            Effect: Allow
            Action: s3:*
            Resource:
              - !GetAtt InternalS3Bucket.Arn
              - !Sub "${InternalS3Bucket.Arn}/*"
              - !GetAtt IacBucket.Arn
              - !Sub "${IacBucket.Arn}/*"
          - Sid: AccessRDS
            Effect: Allow
            Action:
              - rds:DescribeDBInstances
              - rds:Connect
            Resource: "*"
          - Sid: AccessSSMParameters
            Effect: Allow
            Action:
              - ssm:DescribeParameters
              - ssm:GetParameter
              - ssm:GetParameters
              - ssm:GetParametersByPath
              - ssm:PutParameter
            Resource: !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/cc/*"
          - Sid: AccessCloudWatchLogs
            Effect: Allow
            Action: logs:*
            Resource: "*"
          - Sid: AccessXRay
            Effect: Allow
            Action:
              - xray:PutTraceSegments
              - xray:PutTelemetryRecords
              - xray:GetTraceSummaries
              - xray:BatchGetTraces
            Resource: "*"
          - Sid: AllowEvtBridgeOnSfn
            Effect: Allow
            Action: states:StartExecution
            Resource: !Sub "arn:aws:states:*:${AWS::AccountId}:stateMachine:*"
          - Sid: AllowSNSPublish
            Effect: Allow
            Action: sns:Publish
            Resource: !Sub "arn:aws:sns:*:${AWS::AccountId}:main_admin_email"
          - Sid: LambdaVpcAccess
            Effect: Allow
            Action:
              - ec2:DescribeNetworkInterfaces
              - ec2:CreateNetworkInterface
              - ec2:DeleteNetworkInterface
              - ec2:DescribeSecurityGroups
              - ec2:DescribeSubnets
              - ec2:DescribeVpcs
            Resource: "*"
          - Sid: AllowWebSocketManagement
            Effect: Allow
            Action:
              - execute-api:ManageConnections
              - execute-api:Invoke
            Resource: "arn:aws:execute-api:*:*:*/@connections/*"

  CcApiGwRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: CcApiGwRole
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: apigateway.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonAPIGatewayAdministrator
      Tags:
        - Key: Name
          Value: CcApiGwRole

  CcApiGwInvokeLambdaPolicy:
    Type: AWS::IAM::ManagedPolicy
    Properties:
      ManagedPolicyName: CcApiGatewayLambdaPolicy
      Description: Allows API Gateway to invoke the main backend Lambda
      Roles:
        - !Ref CcApiGwRole
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowLambdaActions
            Effect: Allow
            Action:
              - lambda:InvokeFunction
              - lambda:UpdateFunctionCode
              - lambda:PublishVersion
            Resource: !Sub "arn:aws:lambda:*:${AWS::AccountId}:function:cc_main_backend*"

Outputs:
  CcAppRoleArn:
    Value: !GetAtt CcAppRole.Arn
    Export:
      Name: !Sub "cc-iam-${Environment}-AppRoleArn"

  CcAppRoleName:
    Value: !Ref CcAppRole
    Export:
      Name: !Sub "cc-iam-${Environment}-AppRoleName"

  CcApiGwRoleArn:
    Value: !GetAtt CcApiGwRole.Arn
    Export:
      Name: !Sub "cc-iam-${Environment}-ApiGwRoleArn"

  CcApiGwRoleName:
    Value: !Ref CcApiGwRole
    Export:
      Name: !Sub "cc-iam-${Environment}-ApiGwRoleName"

  InternalS3BucketName:
    Value: !Ref InternalS3Bucket
    Export:
      Name: !Sub "cc-iam-${Environment}-InternalS3Bucket"

  InternalS3BucketArn:
    Value: !GetAtt InternalS3Bucket.Arn
    Export:
      Name: !Sub "cc-iam-${Environment}-InternalS3BucketArn"

  IacBucketName:
    Value: !Ref IacBucket
    Export:
      Name: !Sub "cc-iam-${Environment}-IacBucketName"