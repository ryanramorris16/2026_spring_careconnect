 # File: quality/ci/gate/policy.yaml
# ==========================================================
# CareConnect CI Quality & Security Enforcement Policy
# ==========================================================
# This file is the governance contract for the CI Quality Gate.
#
# It defines:
# - Which tools are allowed to block merges (blocking: true/false)
# - What conditions constitute a policy violation (fail_on rules)
#
# How enforcement works (high-level):
# 1) Tools run in CI and emit raw artifacts into:
#      quality/analysis/raw/
# 2) normalize.py parses raw artifacts into a unified schema:
#      quality/analysis/normalized/normalized.json
# 3) policy_engine.py reads normalized.json + this policy.yaml and decides:
#      - policy_violation per tool
#      - overall_block for the pipeline
#
# GLOBAL RULES (enforced by policy_engine.py):
# - Any tool marked `blocking: true` that violates its policy will BLOCK the merge.
# - Any runtime error, missing artifact, skipped execution, or misconfiguration
#   is treated as a violation and will also BLOCK (if blocking is true).
#
# CHANGE CONTROL:
# - Treat this file like production governance configuration.
# - Modify thresholds carefully and commit changes via PR review.
# ==========================================================

# ----------------------------------------------------------
# Global Gate Mode
# ----------------------------------------------------------
# Controls whether the gate enforces merge blocking or runs in
# report-only mode.
#
# mode:
#   - enforce     : Normal behavior. Gate blocks merge on violations.
#   - report_only : Gate still runs, evaluates, and reports violations,
#                   but NEVER blocks the merge (exit code forced to 0).
#
# Use report_only ONLY as a temporary "break glass" option.
# All violations will still be recorded in evaluated.json and summary.md.
#
# MIGRATION NOTE:
# - main must default to enforce mode.
# - report_only is allowed only as a temporary "break glass" setting.
# ----------------------------------------------------------
gate:
  mode: report_only  # enforce | report_only

tools:

  # ----------------------------------------------------------
  # TruffleHog (Secrets Scan)
  # ----------------------------------------------------------
  # Intent: Block on ANY secret finding.
  # Notes:
  # - TruffleHog produces JSONL output; normalization counts findings.
  # ----------------------------------------------------------
  trufflehog:
    blocking: true
    description: "TruffleHog (Secrets Scan)"
    fail_on:
      any_finding: true

  # ----------------------------------------------------------
  # Gitleaks (Secrets Scan)
  # ----------------------------------------------------------
  # Intent: Block on ANY secret finding.
  # Notes:
  # - Complements TruffleHog by scanning the working tree directly.
  # - No API key required. Free and open source (MIT).
  # ----------------------------------------------------------
  gitleaks:
    blocking: true
    description: "Gitleaks (Secrets Scan)"
    fail_on:
      any_finding: true

  # ----------------------------------------------------------
  # Flutter Analyze (Dart Analyzer)
  # ----------------------------------------------------------
  # Intent: Block on any analyzer ERROR.
  # Notes:
  # - Normalization maps analyzer errors → severity_counts.high
  # - Warnings are allowed by default unless you explicitly add a rule.
  # Customization examples:
  #   - To also fail on warnings, add:
  #       warning_count: ">0"
  # ----------------------------------------------------------
  flutter_analyze:
    blocking: true
    description: "Flutter/Dart static analysis"
    fail_on:
      error_count: ">0"

  # ----------------------------------------------------------
  # Checkstyle (Java Style)
  # ----------------------------------------------------------
  # Intent: Any style violation blocks the merge.
  # ----------------------------------------------------------
  checkstyle:
    blocking: true
    description: "Java style enforcement"
    fail_on:
      violation_count: ">0"

  # ----------------------------------------------------------
  # PMD (Java Source Analysis)
  # ----------------------------------------------------------
  # Intent: Block on medium severity and above.
  # Notes:
  # - Normalization maps PMD priority → severity:
  #     priority 1-2 → high
  #     priority 3   → medium
  #     priority 4-5 → low
  # ----------------------------------------------------------
  pmd:
    blocking: true
    description: "Java source static analysis"
    fail_on:
      severity: "medium_and_above"
      # Options:
      #   low_and_above     (strictest; blocks on any finding)
      #   medium_and_above  (current; blocks on medium/high)
      #   high_only         (least strict; blocks only on high)

  # ----------------------------------------------------------
  # SpotBugs (Java Bytecode Analysis)
  # ----------------------------------------------------------
  # Intent: Block on medium severity and above.
  # Notes:
  # - Normalization maps SpotBugs priority → severity:
  #     priority 1 → high
  #     priority 2 → medium
  #     priority 3 → low
  # ----------------------------------------------------------
  spotbugs:
    blocking: true
    description: "Java bytecode analysis"
    fail_on:
      severity: "medium_and_above"

  # ----------------------------------------------------------
  # Semgrep (Multi-language SAST)
  # ----------------------------------------------------------
  # Intent: Block on high severity and above.
  # ----------------------------------------------------------
  semgrep:
    blocking: true
    description: "Multi-language security analysis"
    fail_on:
      severity: "high_and_above"
      # Options:
      #   critical_only
      #   high_and_above     (current)
      #   medium_and_above

  # ----------------------------------------------------------
  # Pylint (Python Static Analysis)
  # ----------------------------------------------------------
  # Intent: Block on errors and fatal issues only.
  # Notes:
  # - Normalization maps Pylint type → severity:
  #     fatal      → critical
  #     error      → high
  #     warning    → medium
  #     refactor   → low
  #     convention → low
  # - Blocking on high_and_above catches errors and fatals
  #   without failing on style/convention findings.
  # Customization examples:
  #   - Block on any finding (strictest):
  #       violation_count: ">0"
  #   - Block on warnings and above:
  #       severity: "medium_and_above"
  # ----------------------------------------------------------
  pylint:
    blocking: true
    description: "Python static analysis (style + correctness)"
    fail_on:
      severity: "high_and_above"
      # Options:
      #   high_and_above   (current; errors + fatals only)
      #   medium_and_above (warnings and above)
      #   violation_count: ">0" (any finding)

  # ----------------------------------------------------------
  # Bandit (Python Security SAST)
  # ----------------------------------------------------------
  # Intent: Block on medium severity and above.
  # Notes:
  # - Normalization maps Bandit severity → normalized:
  #     HIGH   → high
  #     MEDIUM → medium
  #     LOW    → low
  # - LOW findings are typically informational and do not block.
  # Customization examples:
  #   - Block on any finding:
  #       any_finding: true
  #   - Block only on high:
  #       severity: "high_and_above"
  # ----------------------------------------------------------
  bandit:
    blocking: true
    description: "Python security analysis"
    fail_on:
      severity: "medium_and_above"
      # Options:
      #   high_and_above   (least strict; high security issues only)
      #   medium_and_above (current; medium + high)
      #   any_finding: true (strictest)

  # ----------------------------------------------------------
  # HTMLHint (HTML Static Analysis)
  # ----------------------------------------------------------
  # Intent: Advisory only until baseline is established.
  # Notes:
  # - Normalization maps HTMLHint type → severity:
  #     error   → high
  #     warning → medium
  # - Set blocking: true once the HTML baseline is clean.
  # ----------------------------------------------------------
  htmlhint:
    blocking: true
    description: "HTML static analysis"
    fail_on:
      violation_count: ">0"

  # ----------------------------------------------------------
  # Stylelint (CSS/SCSS Static Analysis)
  # ----------------------------------------------------------
  # Intent: Advisory only until baseline is established.
  # Notes:
  # - Normalization maps Stylelint severity → normalized:
  #     error   → high
  #     warning → medium
  # - Set blocking: true once the CSS baseline is clean.
  # ----------------------------------------------------------
  stylelint:
    blocking: true
    description: "CSS/SCSS static analysis"
    fail_on:
      violation_count: ">0"

  # ----------------------------------------------------------
  # OWASP Dependency-Check (SCA)
  # ----------------------------------------------------------
  # Intent: Block on ANY vulnerability (strict).
  # ----------------------------------------------------------
  dependency_check:
    blocking: true
    description: "OWASP Dependency-Check (SCA)"
    fail_on:
      any_vulnerability: true

  # ----------------------------------------------------------
  # Sonar (Quality Gate)
  # ----------------------------------------------------------
  # Intent: Ultimately blocking, but currently advisory until configured.
  # Notes:
  # - Keep `blocking: false` until:
  #     - project is onboarded
  #     - token/access is available
  #     - quality gate is stable
  # ----------------------------------------------------------
  sonar:
    blocking: false
    description: "Sonar Quality Gate"
    fail_on:
      quality_gate: "fail"
