# File: /Volumes/DevDrive/code/2026_spring_careconnect/.github/workflows/build-and-analyze1.yml
# ==========================================================
# Build and Analyze (New Gate Engine)
# ----------------------------------------------------------
# This workflow runs the new Quality & Security Enforcement
# subsystem located under:
#
#   quality/ci/gate/
#
# It performs:
#   1. Tool execution (currently TruffleHog wired)
#   2. Raw artifact generation
#   3. Normalization layer
#   4. Policy evaluation
#   5. Merge approval / block decision
#   6. Rich reporting (report.md) + optional PR comment update
#
# IMPORTANT:
# - All tools run even if one fails.
# - The Python gate engine is the single enforcement point.
# - Exit code from gate.py controls merge status (unless policy gate.mode=report_only).
# ==========================================================

name: Build and Analyze (New Gate Engine)

# ----------------------------------------------------------
# Trigger Conditions
# ----------------------------------------------------------
#
# PRESENT CONFIGURATION (team_d Integration Phase)
#
# pull_request:
#   - Currently UNscoped.
#   - This ensures the workflow executes for all PR events
#     while the workflow file itself is under active development.
#
# push:
#   - Scoped to:
#       • team_d
#       • team_d-*
#   - team_d serves as the controlled CI validation branch.
#
# Temporary Testing Controls:
#   - A Job Guard limits execution to James-owned feature branches.
#   - Dummy artifact generation is enabled to simulate tool outputs.
#   - This configuration is experimental and NOT production-ready.
#
# ----------------------------------------------------------
# FUTURE CONFIGURATION (Production Enforcement on main)
#
# pull_request:
#   branches:
#     - main
#
# push:
#   branches:
#     - main
#
# Required Production Changes:
#   1) Scope pull_request to main only.
#   2) Scope push to main only.
#   3) Remove Job Guard (branch ownership isolation).
#   4) Delete Dummy Artifact step.
#   5) Ensure only real scanners produce raw artifacts.
#
# Production Intent:
#   - main becomes the authoritative enforcement branch.
#   - team_d remains integration/testing only.
# ----------------------------------------------------------
on:
  pull_request:   # Unscoped during integration phase
  push:
    branches:
      - team_d
      - team_d-*

# ----------------------------------------------------------
# Optional Report Timezone
# ----------------------------------------------------------
# This workflow prints BOTH:
# - UTC time (audit-friendly, consistent)
# - A configurable "local" time using REPORT_TZ
#
# NOTE:
# - GitHub Markdown cannot auto-render "each reader's" timezone.
# - Instead, we show UTC + a chosen team timezone.
# - Set REPORT_TZ as a GitHub repo Variable:
#     Settings → Secrets and variables → Actions → Variables
#
# Examples:
#   REPORT_TZ=America/New_York      (EST/EDT)
#   REPORT_TZ=America/Chicago       (CST/CDT)
#   REPORT_TZ=America/Los_Angeles   (PST/PDT)
#   REPORT_TZ=Europe/Berlin         (Germany)
# ----------------------------------------------------------
env:
  REPORT_TZ: ${{ vars.REPORT_TZ }}

# ----------------------------------------------------------
# Permissions
# ----------------------------------------------------------
# Needed only if you want the workflow to post/update PR comments.
# Safe to keep enabled even if the PR comment step is skipped.
# ----------------------------------------------------------
permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    # ------------------------------------------------------
    # Job Guard (Temporary – Branch Ownership Isolation)
    # ------------------------------------------------------
    # PURPOSE (Testing Phase Only):
    # - Allows this workflow to coexist with other classmate workflows
    #   while testing on team_d.
    # - Restricts execution to James-owned feature branches.
    #
    # BEHAVIOR:
    # - On pull_request events:
    #     Runs only if the source branch starts with "team_d-james-".
    # - On push events:
    #     Runs for pushes that match the workflow trigger
    #     (team_d / team_d-*), since github.head_ref is empty.
    #
    # MIGRATION REQUIREMENT:
    # - REMOVE this guard when promoting the workflow to main.
    # - The production gate must enforce policy for ALL contributors,
    #   not only a single branch owner.
    # ------------------------------------------------------
    if: github.event_name == 'push' || startsWith(github.head_ref, 'team_d-james-')

    # ------------------------------------------------------
    # Runner Environment
    # ------------------------------------------------------
    # Ubuntu latest is sufficient for:
    # - Python execution
    # - Docker (for TruffleHog)
    # ------------------------------------------------------
    runs-on: ubuntu-latest

    steps:

      # ------------------------------------------------------
      # Step 1: Checkout Repository
      # ------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # Step 2: Set Up Python Runtime
      # ------------------------------------------------------
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ------------------------------------------------------
      # Step 3: Install Python Dependencies
      # ------------------------------------------------------
      - name: Install Dependencies
        run: |
          pip install pyyaml

      # ------------------------------------------------------
      # Step 4: Create Analysis Directory Structure
      # ------------------------------------------------------
      - name: Create Analysis Directories
        run: |
          mkdir -p quality/analysis/raw
          mkdir -p quality/analysis/normalized
          mkdir -p quality/analysis/evaluated

      # ------------------------------------------------------
      # Step 5: Run TruffleHog (Secrets Scan)
      # ------------------------------------------------------
      # Output:
      #   quality/analysis/raw/trufflehog.jsonl
      #
      # IMPORTANT:
      # - We append `|| true` so that TruffleHog exit codes
      #   do NOT stop the workflow.
      # - The gate engine decides whether to block.
      #
      # PRODUCTION NOTE:
      # - Replace 'trufflesecurity/trufflehog:latest' with a pinned
      #   version tag before promoting this workflow to main.
      # - Floating tags (like :latest) introduce nondeterministic
      #   enforcement behavior over time.
      # ------------------------------------------------------
      - name: Run TruffleHog (Secrets Scan)
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            trufflesecurity/trufflehog:latest \
            filesystem /repo --json \
            > quality/analysis/raw/trufflehog.jsonl || true

      # ------------------------------------------------------
      # TEMPORARY SECTION
      # ------------------------------------------------------
      # The following artifacts are placeholder outputs
      # until real tool integrations are wired.
      #
      # WARNING:
      # This step writes to the SAME filenames the real tools will produce.
      # When you wire a real tool, you MUST delete the corresponding dummy line
      # or the dummy output will overwrite the real report.
      #
      # MIGRATION REQUIREMENT:
      # - DELETE this entire step before merging into main.
      # - This step overwrites real tool outputs and invalidates enforcement.
      # ------------------------------------------------------
      - name: Create Dummy Artifacts (Temporary)
        run: |
          echo '{"error_count":0,"warning_count":0}' > quality/analysis/raw/flutter_analyze.json
          echo '<checkstyle></checkstyle>' > quality/analysis/raw/checkstyle.xml
          echo '<pmd></pmd>' > quality/analysis/raw/pmd.xml
          echo '<BugCollection></BugCollection>' > quality/analysis/raw/spotbugs.xml
          echo '{"results":[]}' > quality/analysis/raw/semgrep.json
          echo '{"dependencies":[]}' > quality/analysis/raw/dependency_check.json
          echo '{"projectStatus":{"status":"OK"}}' > quality/analysis/raw/sonar.json

      # ------------------------------------------------------
      # Step 6: Run Quality Gate Engine
      # ------------------------------------------------------
      # Executes:
      #   python quality/ci/gate/gate.py
      #
      # Produces:
      #   quality/analysis/normalized/normalized.json
      #   quality/analysis/evaluated/evaluated.json
      #   quality/analysis/summary.md
      #   quality/analysis/report.json
      # ------------------------------------------------------
      - name: Run Quality Gate
        run: |
          python quality/ci/gate/gate.py

      # ------------------------------------------------------
      # Step 7: Generate Rich Markdown Report (report.md)
      # ------------------------------------------------------
      # Produces:
      #   quality/analysis/report.md
      #
      # Timestamp:
      # - Always includes UTC
      # - Also includes a configurable "local" time via REPORT_TZ
      #   (useful for teams spread across EST/CST/PST/Germany/etc.)
      #
      # Notes:
      # - Uses evaluated.json produced by gate.py
      # - Uses GitHub context for run/branch metadata
      # ------------------------------------------------------
      - name: Generate Rich Report (report.md)
        if: always()
        uses: actions/github-script@v7
        env:
          REPORT_TZ: ${{ env.REPORT_TZ }}
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const evaluatedPath = path.join(process.env.GITHUB_WORKSPACE, 'quality/analysis/evaluated/evaluated.json');
            const outPath = path.join(process.env.GITHUB_WORKSPACE, 'quality/analysis/report.md');

            let evaluated;
            try {
              evaluated = JSON.parse(fs.readFileSync(evaluatedPath, 'utf8'));
            } catch (e) {
              evaluated = { overall_block: true, results: [] };
            }

            // ---- Timestamp (Always UTC + Always Local) ----
            const now = new Date();

            // Canonical UTC (audit-safe)
            const utc = now.toISOString().replace('T', ' ').replace('Z', ' UTC');

            const statusLine = evaluated.overall_block
              ? '> **🚫 BLOCKED** — One or more required checks failed. Fix the issues below before merging.'
              : '> **✅ APPROVED** — All required checks passed.';

            const categoryMap = {
              trufflehog: 'Secrets Scan',
              checkstyle: 'SAST — Java',
              spotbugs: 'SAST — Java',
              pmd: 'SAST — Java',
              sonar: 'SAST — Java',
              semgrep: 'SAST — Flutter',
              flutter_analyze: 'SAST — Flutter',
              dependency_check: 'SCA'
            };

            const lines = [];
            lines.push('# CareConnect Quality Gate Report');
            lines.push('');
            lines.push(statusLine);
            lines.push('');
            lines.push('## 🔍 CareConnect — Security & Quality Analysis Report');
            lines.push('');

            lines.push('### 📋 Report Header');
            lines.push('| Field | Value |');
            lines.push('|-------|-------|');
            lines.push(`| **Generated (UTC)** | ${utc} |`);
            lines.push(`| **Pipeline Run** | [#${process.env.GITHUB_RUN_NUMBER}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) |`);
            lines.push(`| **Trigger** | \`${process.env.GITHUB_EVENT_NAME}\` |`);
            lines.push('');

            lines.push('_All timestamps are reported in Coordinated Universal Time (UTC)._');
            lines.push('');

            const pr = context.payload.pull_request;
            lines.push('### 🔀 Pull Request');
            lines.push('| Field | Value |');
            lines.push('|-------|-------|');
            lines.push(`| **PR Number** | ${pr ? `#${pr.number}` : '#N/A'} |`);
            lines.push(`| **PR Title** | ${pr ? pr.title.replace(/\|/g, '\\|') : 'N/A'} |`);
            lines.push(`| **PR Author** | @${process.env.GITHUB_ACTOR} |`);
            lines.push(`| **Source Branch** | \`${process.env.GITHUB_HEAD_REF || context.ref.replace('refs/heads/','')}\` |`);
            lines.push(`| **Target Branch** | \`${process.env.GITHUB_BASE_REF || 'N/A'}\` |`);
            lines.push('');

            const sha = process.env.GITHUB_SHA;
            lines.push('### 📝 Commit Details');
            lines.push('| Field | Value |');
            lines.push('|-------|-------|');
            lines.push(`| **Commit SHA** | \`${sha.substring(0,7)}\` ([full](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/commit/${sha})) |`);
            lines.push('');

            lines.push('### 🛡️ Tool Results Summary');
            lines.push('| Tool | Category | Status | Blocking |');
            lines.push('|------|----------|--------|----------|');

            const results = evaluated.results || [];
            for (const r of results) {
              const tool = r.tool;
              const cat = categoryMap[tool] || 'Analysis';
              const ok = !r.policy_violation;
              const status = ok ? '✅ SUCCESS' : '❌ FAILURE';
              const blocking = r.blocking ? '🚫 Yes' : '⚠️ Advisory';
              lines.push(`| ${tool} | ${cat} | ${status} | ${blocking} |`);
            }

            const failures = results.filter(r => r.policy_violation);
            if (failures.length) {
              lines.push('');
              lines.push('### ❌ Failure Details');
              lines.push('');
              for (const f of failures) {
                lines.push(`#### ${f.tool}`);
                lines.push(`_${f.reason || 'policy_violation'} — see raw artifacts in \`quality/analysis/raw/\` and normalized/evaluated outputs._`);
                lines.push('');
              }
            }

            lines.push('---');
            lines.push('_Full artifact bundle available in the workflow run artifacts._');
            lines.push('');

            fs.writeFileSync(outPath, lines.join('\n'), 'utf8');

      # ------------------------------------------------------
      # Step 8: Publish Rich Report to Actions Job Summary (Web View)
      # ------------------------------------------------------
      # Purpose:
      # - Renders the rich report as a "web page" inside the workflow run UI
      #   (Run → Job → Summary tab), so reviewers don't need to download artifacts.
      #
      # Notes:
      # - Uses the Markdown file generated in Step 7:
      #     quality/analysis/report.md
      # - Safe to run even if Step 7 fails (we guard file existence).
      # ------------------------------------------------------
      - name: Publish report to Actions Summary
        if: always()
        run: |
          REPORT_PATH="quality/analysis/report.md"
          if [ -f "$REPORT_PATH" ]; then
            cat "$REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No $REPORT_PATH found to publish." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ------------------------------------------------------
      # Step 9: Post/Update PR Comment (Rich Report)
      # ------------------------------------------------------
      # Purpose:
      # - Recreates the behavior of build-and-analyze.yml
      # - Posts a single rich comment and updates it on re-runs
      #
      # Notes:
      # - Only runs for pull_request events
      # - Requires permissions.pull-requests: write
      # ------------------------------------------------------
      - name: Post Rich Report to PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const marker = '## 🔍 CareConnect — Security & Quality Analysis Report';
            const body = fs.readFileSync(path.join(process.env.GITHUB_WORKSPACE, 'quality/analysis/report.md'), 'utf8');

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number, per_page: 100
            });

            const existing = comments.find(c => c.user?.login === 'github-actions[bot]' && c.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number, body
              });
            }

      # ------------------------------------------------------
      # Step 10: Upload Analysis Artifacts
      # ------------------------------------------------------
      # Uploads all raw, normalized, evaluated, and reporting outputs:
      #   quality/analysis/raw/
      #   quality/analysis/normalized/normalized.json
      #   quality/analysis/evaluated/evaluated.json
      #   quality/analysis/summary.md
      #   quality/analysis/report.json
      #   quality/analysis/report.md
      # ------------------------------------------------------
      - name: Upload Analysis Artifacts
        if: always() # Always upload artifacts, even if gate.py blocks or crashes
        uses: actions/upload-artifact@v4
        with:
          name: quality-analysis-report
          path: quality/analysis/