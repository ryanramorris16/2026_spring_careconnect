# File: /Volumes/DevDrive/code/2026_spring_careconnect/.github/workflows/build-and-analyze1.yml
# ==========================================================
# Build and Analyze (New Gate Engine)
# ----------------------------------------------------------
# Qquality/security workflow for CareConnect.
#
# System of record:
#   quality/ci/gate/
#
# Pipeline responsibilities:
#   1) Execute scanners (SAST/SCA/Secrets)
#   2) Write raw artifacts to: quality/analysis/raw/
#   3) Normalize results:        quality/analysis/normalized/normalized.json
#   4) Evaluate policy:          quality/analysis/evaluated/evaluated.json
#   5) Enforce merge outcome via gate engine exit code
#   6) Publish rich report:
#        - quality/analysis/report.md
#        - Actions Job Summary
#        - Optional PR comment (single updatable comment)
#
# IMPORTANT:
# - Every scanner step is "non-blocking" (|| true). The gate engine decides enforcement.
# - The ONLY environment difference between sandbox and production is SCAN_ROOT via .env.
# - Flip to production by setting SCAN_ROOT='.' in .env (no workflow edits required).
# ==========================================================

name: Build and Analyze (New Gate Engine)

# ----------------------------------------------------------
# Trigger Conditions
# ----------------------------------------------------------
# Integration phase:
# - PRs: unscoped (so this workflow can be iterated safely)
# - Push: scoped to team_d integration branches
#
# Production flip (when ready):
# - Scope pull_request to main
# - Scope push to main
# ----------------------------------------------------------
on:
  pull_request:
  push:
    branches:
      - team_d
      - team_d-*

# ----------------------------------------------------------
# Global Environment Configuration
# ----------------------------------------------------------
# SCAN_ROOT defines the directory that ALL security and
# quality tools will analyze.
#
# ==========================================================
# TESTING MODE (Sandbox Fixtures)
# ==========================================================
# Purpose:
#   Deterministic pass/fail validation of the gate engine.
#
# Usage (set in .env):
#   SCAN_ROOT=quality/sandbox/passing
#   SCAN_ROOT=quality/sandbox/failing
#
# Requirements:
#   - quality/sandbox/passing must exist
#   - quality/sandbox/failing must exist
#
# This mode is strictly for CI validation and must not be
# enabled for production enforcement.
#
#
# ==========================================================
# PRODUCTION MODE (Authoritative Enforcement)
# ==========================================================
# Usage (set in .env):
#   SCAN_ROOT=.
#
# BEFORE enabling production mode:
#   1) Remove sandbox fixtures:
#        git rm -r quality/sandbox/passing
#        git rm -r quality/sandbox/failing
#   2) Commit and push removal.
#
# Production Policy:
#   - No test fixtures may exist in the repository.
#   - All scanners operate on real application code only.
#   - No special exclusions or conditional logic required.
#
# Switching environments requires changing ONLY the .env file.
# No workflow modifications are necessary.
# ----------------------------------------------------------
env:
  SCAN_ROOT: quality/sandbox/passing

# ----------------------------------------------------------
# Permissions
# ----------------------------------------------------------
# pull-requests:write is required only for PR comment updates.
# ----------------------------------------------------------
permissions:
  contents: read
  pull-requests: write

jobs:
  quality-gate:
    # ------------------------------------------------------
    # Runner Environment
    # ------------------------------------------------------
    runs-on: ubuntu-latest

    steps:
      # ------------------------------------------------------
      # Step 1: Checkout Repository
      # ------------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ------------------------------------------------------
      # Step 2: Load Environment Overrides (.env)
      # ------------------------------------------------------
      # If .env exists, SCAN_ROOT is overridden from it.
      # This is the ONLY sandbox/production toggle.
      # ------------------------------------------------------
      - name: Load .env overrides
        shell: bash
        run: |
          set -euo pipefail

          ENV_FILE="${GITHUB_WORKSPACE}/.env"
          if [[ -f "${ENV_FILE}" ]]; then
            # Export only supported keys (keep tight to avoid surprises)
            while IFS='=' read -r key value; do
              [[ -z "${key}" ]] && continue
              [[ "${key}" =~ ^# ]] && continue
              key="$(echo "${key}" | xargs)"
              value="$(echo "${value}" | xargs)"
              case "${key}" in
                SCAN_ROOT)
                  echo "SCAN_ROOT=${value}" >> "$GITHUB_ENV"
                  ;;
                *)
                  ;;
              esac
            done < "${ENV_FILE}"
          fi

      # ------------------------------------------------------
      # Step 3: Set Up Python Runtime
      # ------------------------------------------------------
      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ------------------------------------------------------
      # Step 4: Install Runtime Dependencies
      # ------------------------------------------------------
      # Note: semgrep is installed once here (not per-step).
      # ------------------------------------------------------
      - name: Install Dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install pyyaml semgrep

      # ------------------------------------------------------
      # Step 5: Create Analysis Directory Structure
      # ------------------------------------------------------
      - name: Create Analysis Directories
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p quality/analysis/raw
          mkdir -p quality/analysis/normalized
          mkdir -p quality/analysis/evaluated


















          



      # ======================================================
      # Step 6: TOOL EXECUTION (ALL SCOPED BY SCAN_ROOT)
      # Raw artifacts are written to: quality/analysis/raw/
      # ======================================================

      # ------------------------------------------------------
      # Resolve Scan Roots (Production-safe autodiscovery)
      #
      # SCAN_ROOT can be:
      # - repo root (.) in production
      # - a sandbox folder (quality/sandbox/passing|failing)
      #
      # This step discovers:
      # - FLUTTER_ROOT: directory containing pubspec.yaml (if any)
      # - JAVA_ROOT:    directory containing pom.xml or src/main/java (if any)
      #
      # Exports:
      #   RESOLVED_ROOT, FLUTTER_ROOT, JAVA_ROOT
      # ------------------------------------------------------
      - name: Resolve scan roots
        shell: bash
        run: |
          set -euo pipefail
          ROOT="${GITHUB_WORKSPACE}/${SCAN_ROOT}"

          if [[ ! -d "${ROOT}" ]]; then
            echo "::error::SCAN_ROOT does not exist: ${ROOT}"
            exit 1
          fi

          # Find first pubspec.yaml under ROOT (limits depth to keep CI fast)
          FLUTTER_ROOT="$(find "${ROOT}" -maxdepth 4 -name pubspec.yaml -print -quit | xargs -r dirname || true)"

          # Find Maven root (pom.xml) or fallback to src/main/java parent
          JAVA_POM="$(find "${ROOT}" -maxdepth 6 -name pom.xml -print -quit || true)"
          if [[ -n "${JAVA_POM}" ]]; then
            JAVA_ROOT="$(dirname "${JAVA_POM}")"
          else
            JAVA_SRC="$(find "${ROOT}" -maxdepth 8 -type d -path "*/src/main/java" -print -quit || true)"
            JAVA_ROOT="$(dirname "$(dirname "$(dirname "${JAVA_SRC:-/}")")")"
            [[ "${JAVA_ROOT}" == "/" ]] && JAVA_ROOT=""
          fi

          echo "RESOLVED_ROOT=${ROOT}" >> "$GITHUB_ENV"
          echo "FLUTTER_ROOT=${FLUTTER_ROOT}" >> "$GITHUB_ENV"
          echo "JAVA_ROOT=${JAVA_ROOT}" >> "$GITHUB_ENV"

          echo "SCAN_ROOT=${SCAN_ROOT}"
          echo "RESOLVED_ROOT=${ROOT}"
          echo "FLUTTER_ROOT=${FLUTTER_ROOT:-<none>}"
          echo "JAVA_ROOT=${JAVA_ROOT:-<none>}"

      # ------------------------------------------------------
      # Ensure raw artifact directory exists (single source of truth)
      # ------------------------------------------------------
      - name: Prepare raw output directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/quality/analysis/raw"

      # ------------------------------------------------------
      # Tool: TruffleHog (Secrets)
      #
      # Output (always created):
      #   quality/analysis/raw/trufflehog.jsonl
      # ------------------------------------------------------
      - name: Run TruffleHog (Secrets)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/trufflehog.jsonl"
          : > "${OUT}"

          docker run --rm \
            -v "${GITHUB_WORKSPACE}:/repo" \
            trufflesecurity/trufflehog:3.82.6 \
            filesystem "/repo/${SCAN_ROOT}" --json \
            >> "${OUT}" || true

          # Guarantee non-empty JSONL file exists (parser guard)
          test -s "${OUT}" || echo "" > "${OUT}"

      # ------------------------------------------------------
      # Tool: Flutter Analyze
      #
      # Output (always created):
      #   quality/analysis/raw/flutter_analyze.json
      #
      # Behavior:
      # - Runs only when a real Flutter project is discovered.
      # - Never copies code. Never stages temp projects.
      # ------------------------------------------------------
      - name: Run Flutter Analyze (if Flutter project found)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/flutter_analyze.json"
          echo "[]" > "${OUT}"

          if [[ -z "${FLUTTER_ROOT:-}" ]]; then
            echo "No Flutter project found under SCAN_ROOT; writing empty analyzer output."
            exit 0
          fi

          sudo snap install flutter --classic
          flutter --version

          pushd "${FLUTTER_ROOT}" >/dev/null
          flutter pub get
          flutter analyze --machine > "${OUT}" || true
          popd >/dev/null

          # Analyzer sometimes writes nothing on hard failure; force valid JSON
          test -s "${OUT}" || echo "[]" > "${OUT}"

      # ------------------------------------------------------
      # Toolchain: Java 17 (Required for Checkstyle/PMD/SpotBugs)
      # ------------------------------------------------------
      - name: Setup Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # ------------------------------------------------------
      # Tool: Checkstyle (Java)
      #
      # Output (always created):
      #   quality/analysis/raw/checkstyle.xml
      #
      # Behavior:
      # - Runs only when a Java/Maven root is discovered.
      # - Scans src/main/java when available; otherwise scans JAVA_ROOT.
      # ------------------------------------------------------
      - name: Run Checkstyle (if Java project found)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/checkstyle.xml"
          echo "<checkstyle></checkstyle>" > "${OUT}"

          if [[ -z "${JAVA_ROOT:-}" || ! -d "${JAVA_ROOT}" ]]; then
            echo "No Java project found under SCAN_ROOT; writing empty Checkstyle output."
            exit 0
          fi

          TARGET="${JAVA_ROOT}/src/main/java"
          [[ -d "${TARGET}" ]] || TARGET="${JAVA_ROOT}"

          curl -sSL \
            -o checkstyle.jar \
            https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar

          java -jar checkstyle.jar \
            -c /google_checks.xml \
            "${TARGET}" \
            -f xml \
            -o "${OUT}" || true

          test -s "${OUT}" || echo "<checkstyle></checkstyle>" > "${OUT}"

      # ------------------------------------------------------
      # Tool: PMD (Java)
      #
      # Output (always created):
      #   quality/analysis/raw/pmd.xml
      #
      # Behavior:
      # - Runs only when a Java/Maven root is discovered.
      # - Scans src/main/java when available.
      # ------------------------------------------------------
      - name: Run PMD (if Java project found)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/pmd.xml"
          echo "<pmd></pmd>" > "${OUT}"

          if [[ -z "${JAVA_ROOT:-}" || ! -d "${JAVA_ROOT}" ]]; then
            echo "No Java project found under SCAN_ROOT; writing empty PMD output."
            exit 0
          fi

          TARGET="${JAVA_ROOT}/src/main/java"
          [[ -d "${TARGET}" ]] || TARGET="${JAVA_ROOT}"

          curl -sSL \
            -o pmd.zip \
            https://github.com/pmd/pmd/releases/download/pmd_releases/6.55.0/pmd-bin-6.55.0.zip
          unzip -q pmd.zip

          ./pmd-bin-6.55.0/bin/run.sh pmd \
            -d "${TARGET}" \
            -R category/java/bestpractices.xml \
            -f xml \
            -r "${OUT}" || true

          test -s "${OUT}" || echo "<pmd></pmd>" > "${OUT}"

      # ------------------------------------------------------
      # Tool Prep: Compile Java (for SpotBugs)
      #
      # Exports:
      #   JAVA_CLASSES_DIR
      # ------------------------------------------------------
      - name: Compile Java (for SpotBugs)
        shell: bash
        run: |
          set -euo pipefail
          CLASSES="$(mktemp -d)"
          echo "JAVA_CLASSES_DIR=${CLASSES}" >> "$GITHUB_ENV"

          if [[ -z "${JAVA_ROOT:-}" || ! -d "${JAVA_ROOT}" ]]; then
            echo "No Java project found; skipping compilation."
            exit 0
          fi

          TARGET="${JAVA_ROOT}/src/main/java"
          [[ -d "${TARGET}" ]] || TARGET="${JAVA_ROOT}"

          mapfile -t SOURCES < <(find "${TARGET}" -type f -name "*.java" || true)
          if [[ "${#SOURCES[@]}" -gt 0 ]]; then
            javac -d "${CLASSES}" "${SOURCES[@]}" || true
          fi

      # ------------------------------------------------------
      # Tool: SpotBugs (Java)
      #
      # Output (always created):
      #   quality/analysis/raw/spotbugs.xml
      #
      # Behavior:
      # - Runs only when compiled classes exist.
      # ------------------------------------------------------
      - name: Run SpotBugs (if classes exist)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/spotbugs.xml"
          echo "<BugCollection></BugCollection>" > "${OUT}"

          if [[ -z "${JAVA_CLASSES_DIR:-}" || ! -d "${JAVA_CLASSES_DIR}" ]]; then
            echo "No compiled classes directory; writing empty SpotBugs output."
            exit 0
          fi

          curl -sSL \
            -o spotbugs.tgz \
            https://github.com/spotbugs/spotbugs/releases/download/4.8.3/spotbugs-4.8.3.tgz
          tar -xzf spotbugs.tgz

          ./spotbugs-4.8.3/bin/spotbugs \
            -textui -xml \
            -output "${OUT}" \
            "${JAVA_CLASSES_DIR}" || true

          test -s "${OUT}" || echo "<BugCollection></BugCollection>" > "${OUT}"

      # ------------------------------------------------------
      # Tool: Semgrep (SAST)
      #
      # Output (always created):
      #   quality/analysis/raw/semgrep.json
      # ------------------------------------------------------
      - name: Run Semgrep (SAST)
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/semgrep.json"
          echo '{"results":[]}' > "${OUT}"

          python -m pip install --upgrade pip
          python -m pip install semgrep==1.73.0

          semgrep --config=auto "${RESOLVED_ROOT}" --json > "${OUT}" || true
          test -s "${OUT}" || echo '{"results":[]}' > "${OUT}"

      # ------------------------------------------------------
      # Tool: OWASP Dependency-Check (SCA)
      #
      # Output (always created):
      #   quality/analysis/raw/dependency-check-report.json
      #
      # Note:
      # - --noupdate avoids network flakiness during sandbox validation.
      #   Remove --noupdate when you promote to production enforcement.
      # ------------------------------------------------------
      - name: Run OWASP Dependency-Check (SCA)
        shell: bash
        run: |
          set -euo pipefail
          OUT_DIR="${GITHUB_WORKSPACE}/quality/analysis/raw"
          OUT="${OUT_DIR}/dependency-check-report.json"
          echo '{"dependencies":[],"vulnerabilities":[]}' > "${OUT}"

          curl -sSL \
            -o dc.zip \
            https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip
          unzip -q dc.zip

          ./dependency-check/bin/dependency-check.sh \
            --project "careconnect-scan" \
            --scan "${RESOLVED_ROOT}" \
            --format JSON \
            --out "${OUT_DIR}" \
            --noupdate || true

          test -s "${OUT}" || echo '{"dependencies":[],"vulnerabilities":[]}' > "${OUT}"

      # ------------------------------------------------------
      # Tool: Sonar (placeholder artifact to satisfy gate)
      #
      # Output (always created):
      #   quality/analysis/raw/sonar.json
      #
      # If/when you wire real Sonar later, remove this step.
      # ------------------------------------------------------
      - name: Create Sonar placeholder artifact
        shell: bash
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/quality/analysis/raw/sonar.json"
          echo '{"issues":[]}' > "${OUT}"
          









































      # ======================================================
      # GATE ENGINE + REPORTING
      # ======================================================

      # ------------------------------------------------------
      # Step 7: Run Quality Gate Engine (single enforcement point)
      # ------------------------------------------------------
      - name: Run Quality Gate
        shell: bash
        run: |
          set -euo pipefail
          python -m quality.ci.gate.gate

      # ------------------------------------------------------
      # Step 8: Generate report.md (+ PR comment on PR events)
      #
      # Output:
      #   quality/analysis/report.md
      # ------------------------------------------------------
      - name: Generate report.md (+ PR comment on PR events)
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const workspace = process.env.GITHUB_WORKSPACE;
            const evaluatedPath = path.join(workspace, 'quality/analysis/evaluated/evaluated.json');
            const outPath = path.join(workspace, 'quality/analysis/report.md');

            let evaluated;
            try {
              evaluated = JSON.parse(fs.readFileSync(evaluatedPath, 'utf8'));
            } catch (e) {
              evaluated = { overall_block: true, results: [] };
            }

            const utc = new Date().toISOString().replace('T', ' ').replace('Z', ' UTC');

            const statusLine = evaluated.overall_block
              ? '> **🚫 BLOCKED** — One or more required checks failed. Fix the issues below before merging.'
              : '> **✅ APPROVED** — All required checks passed.';

            const categoryMap = {
              trufflehog: 'Secrets Scan',
              checkstyle: 'SAST — Java',
              spotbugs: 'SAST — Java',
              pmd: 'SAST — Java',
              sonar: 'SAST — Java',
              semgrep: 'SAST — Multi',
              flutter_analyze: 'SAST — Flutter',
              dependency_check: 'SCA'
            };

            const lines = [];
            lines.push('# CareConnect Quality Gate Report');
            lines.push('');
            lines.push(statusLine);
            lines.push('');
            lines.push('## 🔍 CareConnect — Security & Quality Analysis Report');
            lines.push('');

            lines.push('### 📋 Report Header');
            lines.push('| Field | Value |');
            lines.push('|-------|-------|');
            lines.push(`| **Generated (UTC)** | ${utc} |`);
            lines.push(`| **Pipeline Run** | [#${process.env.GITHUB_RUN_NUMBER}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) |`);
            lines.push(`| **Trigger** | \`${process.env.GITHUB_EVENT_NAME}\` |`);
            lines.push(`| **Scan Root** | \`${process.env.SCAN_ROOT}\` |`);
            lines.push('');
            lines.push('_All timestamps are reported in Coordinated Universal Time (UTC)._');
            lines.push('');

            const pr = context.payload.pull_request;
            if (pr) {
              lines.push('### 🔀 Pull Request');
              lines.push('| Field | Value |');
              lines.push('|-------|-------|');
              lines.push(`| **PR Number** | #${pr.number} |`);
              lines.push(`| **PR Title** | ${pr.title.replace(/\|/g, '\\|')} |`);
              lines.push(`| **PR Author** | @${process.env.GITHUB_ACTOR} |`);
              lines.push(`| **Source Branch** | \`${process.env.GITHUB_HEAD_REF}\` |`);
              lines.push(`| **Target Branch** | \`${process.env.GITHUB_BASE_REF}\` |`);
              lines.push('');
            }

            const sha = process.env.GITHUB_SHA || '';
            lines.push('### 📝 Commit Details');
            lines.push('| Field | Value |');
            lines.push('|-------|-------|');
            lines.push(`| **Commit SHA** | \`${sha.substring(0,7)}\` ([full](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/commit/${sha})) |`);
            lines.push('');

            lines.push('### 🛡️ Tool Results Summary');
            lines.push('| Tool | Category | Status | Blocking | Findings (preview) |');
            lines.push('|------|----------|--------|----------|--------------------|');

            const results = evaluated.results || [];
            for (const r of results) {
              const tool = r.tool || 'unknown';
              const cat = categoryMap[tool] || 'Analysis';
              const ok = !r.policy_violation;
              const status = ok ? '✅ SUCCESS' : '❌ FAILURE';
              const blocking = r.blocking ? '🚫 Yes' : '⚠️ Advisory';

              const findings = Array.isArray(r.findings) ? r.findings : [];
              const preview = findings.slice(0, 2).map(f =>
                `\`${f.file || 'unknown'}:${f.line || '?'}\` ${String(f.message || 'Issue').replace(/\|/g,'\\|')}`
              ).join('<br/>') || '—';

              lines.push(`| ${tool} | ${cat} | ${status} | ${blocking} | ${preview} |`);
            }

            lines.push('');
            lines.push('---');
            lines.push('_Full artifact bundle available in the workflow run artifacts._');
            lines.push('');

            const body = lines.join('\n');
            fs.writeFileSync(outPath, body, 'utf8');

            if (context.eventName === 'pull_request' && pr) {
              const marker = '## 🔍 CareConnect — Security & Quality Analysis Report';
              const { owner, repo } = context.repo;
              const issue_number = pr.number;

              const comments = await github.paginate(github.rest.issues.listComments, {
                owner, repo, issue_number, per_page: 100
              });

              const existing = comments.find(c =>
                c.user?.login === 'github-actions[bot]' && c.body?.includes(marker)
              );

              if (existing) {
                await github.rest.issues.updateComment({
                  owner, repo, comment_id: existing.id, body
                });
              } else {
                await github.rest.issues.createComment({
                  owner, repo, issue_number, body
                });
              }
            }

      # ------------------------------------------------------
      # Step 9: Publish report.md to Actions Job Summary
      # ------------------------------------------------------
      - name: Publish report to Actions Summary
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          REPORT_PATH="quality/analysis/report.md"
          if [[ -f "$REPORT_PATH" ]]; then
            cat "$REPORT_PATH" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No $REPORT_PATH found to publish." >> "$GITHUB_STEP_SUMMARY"
          fi

      # ------------------------------------------------------
      # Step 10: Upload Analysis Artifacts
      # ------------------------------------------------------
      - name: Upload Analysis Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-analysis-report
          path: quality/analysis/